# Ceph release.
ceph_release: "{{ _ceph_release }}"

# Ceph version.
ceph_version: "{{ _ceph_version[ceph_release] }}"

# Ceph detected memory total (default with 8192Mi).
ceph_memtotal_mb: "{{ (((ansible_facts['ansible_memtotal_mb'] / 1024) | round(0, 'ceil')) * 1024) | int }}"

# Ceph Manager configs.
ceph_mgr_config:
  - { state: present, section: mgr, option: mgr_client_bytes, value: "{{ ((ceph_memtotal_mb / 256) * 1024 * 1024) | int }}" }  # 128Mi / 4 ~= 32Mi
  - { state: present, section: mgr, option: mgr_client_messages, value: "128" }  # 512 / 4
  - { state: present, section: mgr, option: mgr_initial_modules, value: pg_autoscaler }
  - { state: present, section: mgr, option: mgr_mds_bytes, value: "{{ ((ceph_memtotal_mb / 256) * 1024 * 1024) | int }}" }  # 128Mi / 4 ~= 32Mi
  - { state: present, section: mgr, option: mgr_mds_messages, value: "32" }  # 128 / 4
  - { state: present, section: mgr, option: mgr_mon_bytes, value: "{{ ((ceph_memtotal_mb / 256) * 1024 * 1024) | int }}" }  # 128Mi / 4 ~= 32Mi
  - { state: present, section: mgr, option: mgr_mon_messages, value: "32" }  # 128 / 4
  - { state: present, section: mgr, option: mgr_osd_bytes, value: "{{ ((ceph_memtotal_mb / 64) * 1024 * 1024) | int }}" }  # 512Mi / 4 ~= 128Mi
  - { state: present, section: mgr, option: mgr_osd_messages, value: "2048" }  # 8192 / 4
  - { state: present, section: mgr, option: mgr_tick_period, value: "2" }  # 2
  - { state: present, section: mgr, option: mon_mgr_beacon_grace, value: "30" }  # 30

# Ceph Manager module to be enabled.
ceph_mgr_module:
  - { state: disable, name: iostat }
  - { state: disable, name: nfs }
  - { state: disable, name: restful }
  - { state: enable, name: pg_autoscaler }
